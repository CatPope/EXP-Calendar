services:
  db:
    image: pgvector/pgvector:pg15
    container_name: exp-calendar-db
    environment:
      POSTGRES_USER: exp
      POSTGRES_PASSWORD: exp
      POSTGRES_DB: expcalendar
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exp -d expcalendar"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: exp-calendar-backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://exp:exp@db:5432/expcalendar?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: exp-calendar-frontend
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: exp-calendar-nginx
    profiles:
      - prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  db_data:
