services:
  db:
    image: pgvector/pgvector:pg15
    container_name: exp-calendar-db
    environment:
      POSTGRES_USER: exp
      POSTGRES_PASSWORD: exp
      POSTGRES_DB: expcalendar
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exp -d expcalendar"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: exp-calendar-backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://exp:exp@db:5432/expcalendar?sslmode=disable
      LLM_MODEL: gemini-3.5-flash
      # 로컬 Ollama(1순위). 컨테이너에서 호스트로 나가려면 host.docker.internal 사용.
      # Ollama 가 꺼져 있으면 연결 거부로 즉시 Gemini 로 폴백한다.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma2:9b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_APP_MODE 단일 플래그가 dev/prod 분기를 결정한다.
        # - dev (기본): 브라우저가 :3000 → :8080 백엔드 직접 호출
        # - prod: 같은 오리진 /api 로 호출 → nginx 가 backend 로 프록시
        #         (외부 호스트/터널 도메인 자동 대응)
        # API base URL 은 frontend/lib/api.ts 가 APP_MODE 로부터 파생한다.
        # .env 에서 NEXT_PUBLIC_APP_MODE=prod 로 바꾼 뒤 --build 필요 (NEXT_PUBLIC_* 는 빌드 타임 inlining).
        NEXT_PUBLIC_APP_MODE: ${NEXT_PUBLIC_APP_MODE:-dev}
    container_name: exp-calendar-frontend
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_APP_MODE: ${NEXT_PUBLIC_APP_MODE:-dev}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: exp-calendar-nginx
    profiles:
      - prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  db_data:
