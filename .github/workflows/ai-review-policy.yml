name: AI Review Policy

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-from-ai-comments:
    name: Detect AI Findings Label
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' || github.event_name == 'pull_request' || github.event_name == 'pull_request_review'

    steps:
      - name: Scan AI comments and sync blocker label
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_number=""
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            pr_number="$(jq -r '.pull_request.number // empty' "${GITHUB_EVENT_PATH}")"
          elif [ "${EVENT_NAME}" = "pull_request_review" ]; then
            pr_number="$(jq -r '.pull_request.number // empty' "${GITHUB_EVENT_PATH}")"
          elif [ "${EVENT_NAME}" = "issue_comment" ]; then
            has_pr_context="$(jq -r 'if (.issue.pull_request // null) == null then "false" else "true" end' "${GITHUB_EVENT_PATH}")"
            if [ "${has_pr_context}" = "true" ]; then
              pr_number="$(jq -r '.issue.number // empty' "${GITHUB_EVENT_PATH}")"
            fi
          fi

          if [ -z "${pr_number}" ]; then
            echo "No PR context found. Skipping label sync."
            exit 0
          fi

          comments_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${pr_number}/comments?per_page=100")"

          hits="$(echo "${comments_json}" | jq -r '
            [
              .[]
              | select(.user.login | test("coderabbit|gemini|code-assist"; "i"))
              | select(.body | test("critical vulnerability|security vulnerability detected|regression detected|breaking change detected|high severity.*(security|vulnerab|regression)"; "i"))
            ]
            | length
          ')"

          needs_block="false"
          if [ "${hits}" -gt 0 ]; then
            needs_block="true"
          fi

          issue_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${pr_number}")"

          has_label="$(echo "${issue_json}" | jq -r '[.labels[].name] | index("ai-security-blocker") != null')"

          if [ "${needs_block}" = "true" ] && [ "${has_label}" != "true" ]; then
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPOSITORY}/issues/${pr_number}/labels" \
              -d '{"labels":["ai-security-blocker"]}' >/dev/null
            echo "Label added: ai-security-blocker (PR #${pr_number})"
            exit 0
          fi

          if [ "${needs_block}" != "true" ] && [ "${has_label}" = "true" ]; then
            status_code="$(curl -sS -o /tmp/remove-label-response.txt -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPOSITORY}/issues/${pr_number}/labels/ai-security-blocker")"

            if [ "${status_code}" != "200" ] && [ "${status_code}" != "204" ] && [ "${status_code}" != "404" ]; then
              echo "Failed to remove label (status=${status_code})"
              cat /tmp/remove-label-response.txt || true
              exit 1
            fi

            echo "Label removed: ai-security-blocker (PR #${pr_number})"
            exit 0
          fi

          echo "Label state unchanged: needsBlock=${needs_block}, hasLabel=${has_label} (PR #${pr_number})"

  policy-gate:
    name: AI Review Policy
    runs-on: ubuntu-latest
    needs: [label-from-ai-comments]
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_review') && github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'

    steps:
      - name: Checkout policy scripts
        uses: actions/checkout@v7

      - name: Enforce AI PR body contract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/validate-ai-pr-body.mjs

      - name: Enforce human approval on AI security/regression blockers
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER}" ]; then
            echo "No PR context. Skipping approval policy check."
            exit 0
          fi

          pr_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/pulls/${PR_NUMBER}")"

          has_blocker="$(echo "${pr_json}" | jq -r '[.labels[].name] | index("ai-security-blocker") != null')"

          comments_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100")"

          hits="$(echo "${comments_json}" | jq -r '
            [
              .[]
              | select(.user.login | test("coderabbit|gemini|code-assist"; "i"))
              | select(.body | test("critical vulnerability|security vulnerability detected|regression detected|breaking change detected|high severity.*(security|vulnerab|regression)"; "i"))
            ]
            | length
          ')"

          if [ "${hits}" -eq 0 ]; then
            if [ "${has_blocker}" = "true" ]; then
              status_code="$(curl -sS -o /tmp/remove-label-response.txt -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/labels/ai-security-blocker")"

              if [ "${status_code}" != "200" ] && [ "${status_code}" != "204" ] && [ "${status_code}" != "404" ]; then
                echo "Failed to remove stale blocker label (status=${status_code})"
                cat /tmp/remove-label-response.txt || true
                exit 1
              fi

              echo "Stale blocker label removed."
            fi

            echo "No actionable blocker signals in AI comments."
            exit 0
          fi

          reviews_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100")"

          approvals="$(echo "${reviews_json}" | jq -r '
            reduce .[] as $review (
              {};
              .[$review.user.login] = {
                state: $review.state,
                user_type: $review.user.type
              }
            )
            | to_entries
            | map(select(.value.state == "APPROVED" and .value.user_type != "Bot"))
            | length
          ')"

          if [ "${approvals}" -lt 1 ]; then
            echo "AI review detected security/regression issues."
            echo "At least 1 human reviewer APPROVED status is required."
            exit 1
          fi

          echo "Blocker detected, human approval count: ${approvals}"
          echo "AI review policy check passed."
